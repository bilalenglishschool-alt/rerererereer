services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: .
    env_file:
      - .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BASE_URL: ${BASE_URL}
      STORAGE_PATH: ${STORAGE_PATH}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      WHISPER_MODEL: ${WHISPER_MODEL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: uvicorn tutor_assistant.backend:app --host 0.0.0.0 --port 8000
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - tutor_data:${STORAGE_PATH:-/data}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    profiles: ["polling"]
    build: .
    env_file:
      - .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BASE_URL: ${BASE_URL}
      STORAGE_PATH: ${STORAGE_PATH}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      WHISPER_MODEL: ${WHISPER_MODEL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: python -m tutor_assistant.bot
    volumes:
      - tutor_data:${STORAGE_PATH:-/data}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  worker:
    build: .
    env_file:
      - .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BASE_URL: ${BASE_URL}
      STORAGE_PATH: ${STORAGE_PATH}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      WHISPER_MODEL: ${WHISPER_MODEL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: python -m tutor_assistant.worker
    volumes:
      - tutor_data:${STORAGE_PATH:-/data}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tutor_data:
  postgres_data:
