<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whisper Transcription</title>
  <style>
    :root {
      --bg: #f7fafc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --warn: #b45309;
      --error: #b91c1c;
      --ok: #047857;
      --border: #d1d5db;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Noto Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #e6fffa 0%, var(--bg) 48%, #eef2ff 100%);
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 32px rgba(15, 23, 42, 0.10);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.55rem;
    }

    p.meta {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    input[type="file"] {
      flex: 1;
      min-width: 220px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    select {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 0.98rem;
      transition: transform .08s ease, opacity .2s ease;
    }

    button:active { transform: translateY(1px); }
    button[disabled] { opacity: .6; cursor: not-allowed; }

    .primary { background: var(--accent); color: #fff; }
    .secondary { background: #e5e7eb; color: #111827; }

    .status {
      border-radius: 10px;
      padding: 10px 12px;
      background: #ecfeff;
      color: #134e4a;
      margin-bottom: 12px;
    }

    .status.warn { background: #fff7ed; color: var(--warn); }
    .status.error { background: #fee2e2; color: var(--error); }
    .status.ok { background: #d1fae5; color: var(--ok); }

    .kv {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      resize: vertical;
      font: inherit;
      line-height: 1.4;
    }

    .history {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .history h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .jobs {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .jobs li {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fbfbfc;
    }

    .jobs .meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.35;
      flex: 1;
      min-width: 220px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Whisper Transcription</h1>
    <p class="meta">
      Загрузите аудио-файл, система поставит задачу в очередь и вернет готовый текст после обработки.
    </p>

    <div class="row">
      <input id="audioInput" type="file" accept="audio/*,.webm,.mp3,.wav,.m4a,.ogg,.flac,.aac,.mp4" />
      <button id="uploadBtn" class="primary">Транскрибировать</button>
      <button id="retryBtn" class="secondary" hidden>Retry</button>
      <button id="cancelBtn" class="secondary" hidden>Cancel</button>
      <button id="deleteBtn" class="secondary" hidden>Delete</button>
    </div>

    <div class="row">
      <button id="copyBtn" class="secondary" disabled>Copy text</button>
      <button id="downloadBtn" class="secondary" disabled>Download .txt</button>
      <label for="statusFilter">Фильтр:</label>
      <select id="statusFilter">
        <option value="">Все статусы</option>
        <option value="queued">queued</option>
        <option value="processing">processing</option>
        <option value="done">done</option>
        <option value="failed">failed</option>
        <option value="canceled">canceled</option>
      </select>
      <button id="refreshBtn" class="secondary">Обновить список</button>
    </div>

    <div id="status" class="status">Ожидание файла.</div>
    <p id="meta" class="kv">Job: -</p>
    <textarea id="result" placeholder="Здесь появится транскрипт..." readonly></textarea>

    <section class="history">
      <h2>Последние задачи</h2>
      <ul id="jobsList" class="jobs">
        <li><p class="meta">Список пуст.</p></li>
      </ul>
    </section>
  </main>

  <script>
    const audioInput = document.getElementById("audioInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const retryBtn = document.getElementById("retryBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const copyBtn = document.getElementById("copyBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusFilterEl = document.getElementById("statusFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusEl = document.getElementById("status");
    const metaEl = document.getElementById("meta");
    const resultEl = document.getElementById("result");
    const jobsListEl = document.getElementById("jobsList");

    let activeJobId = "";
    let pollingTimer = null;

    function setStatus(text, cls = "") {
      statusEl.textContent = text;
      statusEl.className = `status ${cls}`.trim();
    }

    function setMeta(text) {
      metaEl.textContent = text;
    }

    function formatDate(value) {
      if (!value) {
        return "-";
      }
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) {
        return value;
      }
      return d.toLocaleString();
    }

    function syncResultActions() {
      const hasText = Boolean(resultEl.value && resultEl.value.trim());
      copyBtn.disabled = !hasText;
      downloadBtn.disabled = !(activeJobId && hasText);
    }

    function stopPolling() {
      if (pollingTimer) {
        window.clearTimeout(pollingTimer);
        pollingTimer = null;
      }
    }

    async function fetchJob(jobId) {
      const response = await fetch(`/api/transcribe/jobs/${encodeURIComponent(jobId)}`);
      if (!response.ok) {
        throw new Error(`status check failed: HTTP ${response.status}`);
      }
      return response.json();
    }

    async function fetchJobs(limit = 20, statusFilter = "") {
      const params = new URLSearchParams();
      params.set("limit", String(limit));
      const normalizedStatus = String(statusFilter || "").trim().toLowerCase();
      if (normalizedStatus) {
        params.set("status", normalizedStatus);
      }
      const response = await fetch(`/api/transcribe/jobs?${params.toString()}`);
      if (!response.ok) {
        throw new Error(`jobs list failed: HTTP ${response.status}`);
      }
      return response.json();
    }

    function renderJobs(items) {
      jobsListEl.innerHTML = "";
      if (!Array.isArray(items) || items.length === 0) {
        const li = document.createElement("li");
        const activeFilter = String(statusFilterEl?.value || "").trim();
        if (activeFilter) {
          li.innerHTML = `<p class="meta">Для фильтра status=${activeFilter} задач нет.</p>`;
        } else {
          li.innerHTML = '<p class="meta">Список пуст.</p>';
        }
        jobsListEl.appendChild(li);
        return;
      }

      for (const item of items) {
        const li = document.createElement("li");
        const meta = document.createElement("p");
        meta.className = "meta";
        meta.textContent = `#${item.job_id} | status=${item.status} | attempts=${item.processing_attempts} | created=${formatDate(item.created_at)}`;

        const btn = document.createElement("button");
        btn.className = "secondary";
        btn.textContent = "Открыть";
        btn.addEventListener("click", () => {
          void loadJob(item.job_id);
        });

        li.appendChild(meta);
        li.appendChild(btn);
        jobsListEl.appendChild(li);
      }
    }

    async function refreshJobs() {
      try {
        const payload = await fetchJobs(20, statusFilterEl ? statusFilterEl.value : "");
        renderJobs(payload.items || []);
      } catch (error) {
        const text = error instanceof Error ? error.message : String(error);
        setStatus(`Не удалось загрузить список: ${text}`, "error");
      }
    }

    function applyJobPayload(payload, source = "poll") {
      activeJobId = payload.job_id || "";
      setMeta(
        `Job: ${payload.job_id} | status: ${payload.status} | attempts: ${payload.processing_attempts} | created: ${formatDate(payload.created_at)}`
      );
      resultEl.value = payload.transcript_text || "";
      syncResultActions();

      if (payload.status === "done") {
        setStatus("Готово: транскрибация завершена.", "ok");
        retryBtn.hidden = true;
        cancelBtn.hidden = true;
        deleteBtn.hidden = false;
        uploadBtn.disabled = false;
      } else if (payload.status === "canceled") {
        setStatus("Задача отменена пользователем.", "warn");
        retryBtn.hidden = false;
        cancelBtn.hidden = true;
        deleteBtn.hidden = false;
        uploadBtn.disabled = false;
        stopPolling();
      } else if (payload.status === "failed") {
        setStatus(`Ошибка обработки: ${payload.processing_error || "неизвестно"}`, "error");
        retryBtn.hidden = false;
        cancelBtn.hidden = true;
        deleteBtn.hidden = false;
        uploadBtn.disabled = false;
      } else if (source === "load") {
        setStatus("Задача загружена, обновляю статус...", "warn");
        retryBtn.hidden = true;
        cancelBtn.hidden = false;
        deleteBtn.hidden = true;
        uploadBtn.disabled = true;
        schedulePoll();
      } else if (payload.status === "queued" || payload.status === "processing") {
        setStatus("Задача в работе, обновляю статус...", "warn");
        retryBtn.hidden = true;
        cancelBtn.hidden = false;
        deleteBtn.hidden = true;
        uploadBtn.disabled = true;
        schedulePoll();
      }
    }

    async function loadJob(jobId) {
      try {
        setStatus("Загружаю задачу...", "warn");
        const payload = await fetchJob(jobId);
        applyJobPayload(payload, "load");
        if (payload.status === "queued" || payload.status === "processing") {
          schedulePoll();
        } else {
          stopPolling();
        }
      } catch (error) {
        const text = error instanceof Error ? error.message : String(error);
        setStatus(`Не удалось открыть задачу: ${text}`, "error");
      }
    }

    function schedulePoll() {
      stopPolling();
      pollingTimer = window.setTimeout(pollJob, 2000);
    }

    async function pollJob() {
      if (!activeJobId) {
        return;
      }
      try {
        const payload = await fetchJob(activeJobId);
        applyJobPayload(payload, "poll");
        if (payload.status === "queued" || payload.status === "processing") {
          setStatus("Задача в работе, обновляю статус...", "warn");
          schedulePoll();
          return;
        }
        stopPolling();
        await refreshJobs();
      } catch (error) {
        const text = error instanceof Error ? error.message : String(error);
        setStatus(`Не удалось получить статус: ${text}`, "error");
        uploadBtn.disabled = false;
        retryBtn.hidden = false;
        cancelBtn.hidden = true;
      }
    }

    async function createJob() {
      const file = audioInput.files && audioInput.files[0];
      if (!file) {
        setStatus("Сначала выберите аудио-файл.", "warn");
        return;
      }

      const form = new FormData();
      form.append("audio", file, file.name);

      uploadBtn.disabled = true;
      retryBtn.hidden = true;
      cancelBtn.hidden = true;
      deleteBtn.hidden = true;
      setStatus("Загружаю файл и ставлю задачу в очередь...", "warn");
      resultEl.value = "";

      try {
        const response = await fetch("/api/transcribe/jobs", {
          method: "POST",
          body: form,
        });
        if (!response.ok) {
          let detail = `HTTP ${response.status}`;
          try {
            const payload = await response.json();
            if (payload && payload.detail) {
              detail = String(payload.detail);
            }
          } catch (_err) {
            // no-op
          }
          throw new Error(detail);
        }

        const payload = await response.json();
        applyJobPayload(payload, "create");
        setStatus("Задача поставлена в очередь. Ожидаем результат...", "warn");
        await refreshJobs();
        schedulePoll();
      } catch (error) {
        const text = error instanceof Error ? error.message : String(error);
        setStatus(`Не удалось создать задачу: ${text}`, "error");
        uploadBtn.disabled = false;
      }
    }

    async function retryJob() {
      if (!activeJobId) {
        return;
      }
      uploadBtn.disabled = true;
      retryBtn.hidden = true;
      cancelBtn.hidden = true;
      deleteBtn.hidden = true;
      setStatus("Перезапускаю задачу...", "warn");
      resultEl.value = "";

      try {
        const response = await fetch(
          `/api/transcribe/jobs/${encodeURIComponent(activeJobId)}/retry`,
          { method: "POST" }
        );
        if (!response.ok) {
          let detail = `HTTP ${response.status}`;
          try {
            const payload = await response.json();
            if (payload && payload.detail) {
              detail = String(payload.detail);
            }
          } catch (_err) {
            // no-op
          }
          throw new Error(detail);
        }

        const payload = await response.json();
        applyJobPayload(payload, "retry");
        setStatus("Повторный запуск принят. Ожидаем...", "warn");
        await refreshJobs();
        schedulePoll();
      } catch (error) {
        const text = error instanceof Error ? error.message : String(error);
        setStatus(`Retry не выполнен: ${text}`, "error");
        uploadBtn.disabled = false;
        retryBtn.hidden = false;
        cancelBtn.hidden = true;
      }
    }

    async function cancelJob() {
      if (!activeJobId) {
        setStatus("Сначала выберите задачу.", "warn");
        return;
      }

      uploadBtn.disabled = true;
      retryBtn.hidden = true;
      cancelBtn.hidden = true;
      deleteBtn.hidden = true;
      setStatus("Отменяю задачу...", "warn");

      try {
        const response = await fetch(
          `/api/transcribe/jobs/${encodeURIComponent(activeJobId)}/cancel`,
          { method: "POST" }
        );
        if (!response.ok) {
          let detail = `HTTP ${response.status}`;
          try {
            const payload = await response.json();
            if (payload && payload.detail) {
              detail = String(payload.detail);
            }
          } catch (_err) {
            // no-op
          }
          throw new Error(detail);
        }

        const payload = await response.json();
        applyJobPayload(payload, "cancel");
        await refreshJobs();
      } catch (error) {
        const text = error instanceof Error ? error.message : String(error);
        setStatus(`Не удалось отменить задачу: ${text}`, "error");
        uploadBtn.disabled = false;
      }
    }

    async function deleteJob() {
      if (!activeJobId) {
        setStatus("Сначала выберите задачу.", "warn");
        return;
      }
      if (!window.confirm("Удалить задачу и связанные файлы транскрипта?")) {
        return;
      }

      uploadBtn.disabled = true;
      retryBtn.hidden = true;
      cancelBtn.hidden = true;
      deleteBtn.hidden = true;
      setStatus("Удаляю задачу...", "warn");

      try {
        const response = await fetch(
          `/api/transcribe/jobs/${encodeURIComponent(activeJobId)}`,
          { method: "DELETE" }
        );
        if (!response.ok) {
          let detail = `HTTP ${response.status}`;
          try {
            const payload = await response.json();
            if (payload && payload.detail) {
              detail = String(payload.detail);
            }
          } catch (_err) {
            // no-op
          }
          throw new Error(detail);
        }

        activeJobId = "";
        resultEl.value = "";
        setMeta("Job: -");
        stopPolling();
        uploadBtn.disabled = false;
        syncResultActions();
        await refreshJobs();
        setStatus("Задача удалена.", "ok");
      } catch (error) {
        const text = error instanceof Error ? error.message : String(error);
        setStatus(`Не удалось удалить задачу: ${text}`, "error");
        uploadBtn.disabled = false;
        deleteBtn.hidden = false;
      }
    }

    async function copyTranscript() {
      const text = (resultEl.value || "").trim();
      if (!text) {
        setStatus("Текста для копирования нет.", "warn");
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        setStatus("Транскрипт скопирован в буфер обмена.", "ok");
      } catch (_error) {
        setStatus("Не удалось скопировать текст.", "error");
      }
    }

    async function downloadTranscript() {
      if (!activeJobId) {
        setStatus("Сначала выберите задачу.", "warn");
        return;
      }
      try {
        const response = await fetch(
          `/api/transcribe/jobs/${encodeURIComponent(activeJobId)}/transcript`
        );
        if (!response.ok) {
          let detail = `HTTP ${response.status}`;
          try {
            const payload = await response.json();
            if (payload && payload.detail) {
              detail = String(payload.detail);
            }
          } catch (_err) {
            // no-op
          }
          throw new Error(detail);
        }

        const blob = await response.blob();
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `transcript-${activeJobId}.txt`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus("Файл транскрипта скачан.", "ok");
      } catch (error) {
        const text = error instanceof Error ? error.message : String(error);
        setStatus(`Не удалось скачать transcript: ${text}`, "error");
      }
    }

    uploadBtn.addEventListener("click", () => {
      void createJob();
    });
    retryBtn.addEventListener("click", () => {
      void retryJob();
    });
    cancelBtn.addEventListener("click", () => {
      void cancelJob();
    });
    deleteBtn.addEventListener("click", () => {
      void deleteJob();
    });
    copyBtn.addEventListener("click", () => {
      void copyTranscript();
    });
    downloadBtn.addEventListener("click", () => {
      void downloadTranscript();
    });
    refreshBtn.addEventListener("click", () => {
      void refreshJobs();
    });
    statusFilterEl.addEventListener("change", () => {
      void refreshJobs();
    });

    syncResultActions();
    void refreshJobs();
  </script>
</body>
</html>
